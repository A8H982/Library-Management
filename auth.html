<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — GJ Library</title>
  <script src="js/theme-init.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-body">
  <div class="auth-global-bar">
    <div class="theme-switcher theme-switcher-compact" role="group" aria-label="Color theme">
      <button type="button" class="theme-btn" data-theme-pref="light" aria-pressed="false" aria-label="Light theme" title="Light mode">
        <svg class="theme-btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
      </button>
      <button type="button" class="theme-btn" data-theme-pref="dark" aria-pressed="false" aria-label="Dark theme" title="Dark mode">
        <svg class="theme-btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button type="button" class="theme-btn" data-theme-pref="system" aria-pressed="false" aria-label="Use system theme" title="Match system setting">
        <svg class="theme-btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      </button>
    </div>
    <a href="index.html" class="auth-global-back">← Home</a>
  </div>
  <div class="auth-page">
    <aside class="auth-brand">
      <a href="index.html" class="brand">
        <span class="brand-mark">GJ</span>
        GJ Library
      </a>
      <p class="auth-brand-tagline" id="auth-brand-tagline">Library staff sign in and registration.</p>
      <p class="auth-brand-meta">Rambagh, Bihta, Patna</p>
    </aside>
    <div class="auth-panel-wrap">
      <div class="auth-panel">
        <div class="auth-portal-tabs" role="tablist" aria-label="Who is signing in">
          <button type="button" class="auth-portal-tab is-active" data-portal="staff" role="tab" aria-selected="true" id="auth-tab-portal-staff">Staff</button>
          <button type="button" class="auth-portal-tab" data-portal="student" role="tab" aria-selected="false" id="auth-tab-portal-student">Student</button>
        </div>

        <div class="auth-tabs" role="tablist">
          <button type="button" class="auth-tab is-active" data-tab="login" role="tab" aria-selected="true">Sign in</button>
          <button type="button" class="auth-tab" data-tab="signup" role="tab" aria-selected="false">Create account</button>
        </div>

        <div id="auth-global-message" class="auth-message" hidden></div>

        <div id="auth-block-login" class="auth-panel-block" role="tabpanel">
          <h1 id="auth-login-title">Welcome back</h1>
          <p class="auth-lead" id="auth-login-lead">Sign in with your library staff account.</p>
          <form id="form-login" novalidate>
            <div class="form-field">
              <label for="login-email">Email</label>
              <input type="email" id="login-email" autocomplete="email" required placeholder="you@college.edu">
            </div>
            <div class="form-field">
              <label for="login-password">Password</label>
              <div class="password-input-wrap">
                <input type="password" id="login-password" autocomplete="current-password" required placeholder="••••••••">
                <button type="button" class="password-toggle" aria-label="Show password" aria-pressed="false" title="Show password">
                  <svg class="password-toggle-icon password-toggle-icon-show" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                  <svg class="password-toggle-icon password-toggle-icon-hide" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                </button>
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block" id="btn-login-submit">Sign in</button>
          </form>
        </div>

        <div id="auth-block-signup" class="auth-panel-block" role="tabpanel" hidden>
          <h1 id="auth-signup-title">Create account</h1>
          <p class="auth-lead" id="auth-signup-lead">Use your college email. Your account type matches the Staff or Student tab above.</p>
          <form id="form-signup" novalidate>
            <div class="form-field">
              <label for="signup-email">Email</label>
              <input type="email" id="signup-email" autocomplete="email" required placeholder="you@college.edu">
            </div>
            <div class="form-field">
              <label for="signup-password">Password</label>
              <div class="password-input-wrap">
                <input type="password" id="signup-password" autocomplete="new-password" required minlength="6" placeholder="At least 6 characters">
                <button type="button" class="password-toggle" aria-label="Show password" aria-pressed="false" title="Show password">
                  <svg class="password-toggle-icon password-toggle-icon-show" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                  <svg class="password-toggle-icon password-toggle-icon-hide" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                </button>
              </div>
            </div>
            <div class="form-field">
              <label for="signup-password-confirm">Confirm password</label>
              <div class="password-input-wrap">
                <input type="password" id="signup-password-confirm" autocomplete="new-password" required placeholder="Repeat password">
                <button type="button" class="password-toggle" aria-label="Show password" aria-pressed="false" title="Show password">
                  <svg class="password-toggle-icon password-toggle-icon-show" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                  <svg class="password-toggle-icon password-toggle-icon-hide" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                </button>
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block" id="btn-signup-submit">Create account</button>
          </form>
        </div>

        <a href="index.html" class="auth-back">← Back to home</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth-app-role.js"></script>
  <script src="js/header-profile.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
